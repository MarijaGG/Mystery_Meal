<!DOCTYPE html>
<html lang="lv">
<head>
  <meta charset="UTF-8">
  <title>Raining Food Minigame</title>
  <style>
    body { margin:0; overflow:hidden; background: radial-gradient(circle at top, #1e293b, #020617); font-family:sans-serif; color:white; }
    canvas { display:block; }
    #ui { position:absolute; top:15px; left:20px; font-size:20px; }
    #gameOver { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); font-size:40px; text-align:center; display:none; }
    button { padding:10px 20px; border:none; border-radius:10px; font-size:18px; cursor:pointer; margin-top:20px; }
    .back-btn { position: absolute; top: 15px; right: 20px;color: white; }
    
  </style>
</head>
<body>

  <a href="../index.php" class="menu-btn back-btn">← Back to Home</a>

<div id="ui">
  Score: <span id="score">0</span> | HighScore: <span id="high">0</span>
</div>

<div id="gameOver">
  GAME OVER<br>
  <button onclick="restart()">Restart</button>
  
</div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let score = 0;
let gameOver = false;
let speedIncrease = 0;

let highScore = localStorage.getItem("highscore") || 0;
document.getElementById("high").innerText = highScore;

const basket = {
  x: canvas.width/2,
  y: canvas.height - 100,
  width: 100,
  height: 40,
  velocity: 0
};

const foods = ["🍎","🍕","🍇","🍔","🧀","🍗"];
const junk = ["💣","⚡","🧪","☠️"];

let objects = [];

function spawnObject(){
  const isFood = Math.random() > 0.25;
  objects.push({
    x: Math.random()*canvas.width,
    y: -40,
    speed: 2 + Math.random()*1.5 + speedIncrease,
    type: isFood ? "food" : "junk",
    icon: isFood ? foods[Math.floor(Math.random()*foods.length)] : junk[Math.floor(Math.random()*junk.length)]
  });
}

function drawBasket(){
  ctx.fillStyle = "#f59e0b";
  ctx.beginPath();
  ctx.roundRect(basket.x, basket.y, basket.width, basket.height, 10);
  ctx.fill();

  ctx.strokeStyle = "#fbbf24";
  ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.arc(basket.x + basket.width/2, basket.y, basket.width/3, Math.PI, 0);
  ctx.stroke();
}

function drawObjects(){
  ctx.font = "32px Arial";
  objects.forEach(obj=>{
    ctx.fillText(obj.icon, obj.x, obj.y);
  });
}

function updateObjects(){
  for(let i = objects.length - 1; i >= 0; i--){
    const obj = objects[i];
    obj.y += obj.speed;

    if(obj.y > basket.y && obj.x > basket.x && obj.x < basket.x + basket.width){
      if(obj.type === "food"){
        score++;
      } else {
        endGame();
      }
      objects.splice(i,1);
      continue;
    }

    if(obj.y > canvas.height){
      objects.splice(i,1);
    }
  }
}

function updateBasket(){
  basket.x += basket.velocity;
  basket.velocity *= 0.9;

  if(basket.x < 0) basket.x = 0;
  if(basket.x > canvas.width - basket.width) basket.x = canvas.width - basket.width;
}

function gameLoop(){
  if(gameOver) return;

  ctx.clearRect(0,0,canvas.width,canvas.height);

  drawBasket();
  drawObjects();
  updateObjects();
  updateBasket();

  document.getElementById("score").innerText = score;

  // difficulty scaling
  speedIncrease += 0.0005;

  requestAnimationFrame(gameLoop);
}

function endGame(){
  gameOver = true;

  if(score > highScore){
    localStorage.setItem("highscore", score);
  }

  document.getElementById("gameOver").style.display = "block";
}

function restart(){
  score = 0;
  objects = [];
  gameOver = false;
  speedIncrease = 0;
  highScore = localStorage.getItem("highscore") || 0;
  document.getElementById("high").innerText = highScore;
  document.getElementById("gameOver").style.display = "none";
  gameLoop();
}

// mouse
canvas.addEventListener("mousemove", (e)=>{
  basket.x = e.clientX - basket.width/2;
});

// keyboard
window.addEventListener("keydown", (e)=>{
  if(e.key === "ArrowLeft") basket.velocity -= 1.5;
  if(e.key === "ArrowRight") basket.velocity += 1.5;
});

// touch
canvas.addEventListener("touchmove", (e)=>{
  basket.x = e.touches[0].clientX - basket.width/2;
});

setInterval(spawnObject,700);

gameLoop();
</script>

</body>
</html>
